<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Low-Rate DDoS Firewall Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #e0e0e0; margin: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        h2 { margin-top: 0; color: #ffffff; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .log-box { background: #000; padding: 15px; font-family: monospace; height: 250px; overflow-y: auto; border-radius: 4px; color: #00ff00; }
        .badge { font-weight: bold; padding: 4px 8px; border-radius: 4px; }
        .danger { color: #ff3333; }
        .safe { color: #33ff33; }
    </style>
</head>
<body>
    <h1>Intrusion Detection System Dashboard</h1>
    <div class="grid">
        <div class="card">
            <h2>System Status</h2>
            <p>Engine State: <span id="engine-status" class="badge safe">Loading...</span></p>
            <p>Buffer Windows Attached: <span id="buffer-count">0</span> / 30</p>
            <p>Anomaly Target Score: <span id="anomaly-score">0.0000</span></p>
        </div>
        <div class="card">
            <h2>Active Firewall Blocks (iptables)</h2>
            <ul id="blocked-list" class="danger"></ul>
        </div>
    </div>
    <div class="card">
        <h2>Live Pipeline Engine Logs</h2>
        <div id="log-container" class="log-box"></div>
    </div>

    <script>
        function updateDashboard() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('engine-status').innerText = data.metrics.status;
                    document.getElementById('buffer-count').innerText = data.metrics.active_window_count;
                    
                    const scoreElement = document.getElementById('anomaly-score');
                    const score = data.metrics.last_score;
                    scoreElement.innerText = score.toFixed(4);
                    scoreElement.className = score >= 0.85 ? "danger" : "safe";

                    const listContainer = document.getElementById('blocked-list');
                    listContainer.innerHTML = data.blocked.length === 0 ? "<li>No active blocks applied.</li>" : "";
                    data.blocked.forEach(ip => {
                        let li = document.createElement('li');
                        li.innerText = ip;
                        listContainer.appendChild(li);
                    });

                    const logContainer = document.getElementById('log-container');
                    logContainer.innerHTML = data.logs.map(log => `<div>${log}</div>`).join('');
                    logContainer.scrollTop = logContainer.scrollHeight;
                });
        }
        setInterval(updateDashboard, 1000);
    </script>
</body>
</html>
